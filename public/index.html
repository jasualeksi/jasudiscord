<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <title>Jasu〡Discord</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <link rel="stylesheet" href="styles.css">
    <script src="commands.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#top" aria-label="Jasu Discord">
        <img class="brand-logo" src="assets/logo-animated.gif?v=6" alt="">
        <span>Jasu〡Discord</span>
      </a>
      <nav class="topnav" aria-label="Päänavigaatio">
        <a href="#commands">Discord komennot</a>
      </nav>
    </header>

    <main class="page" id="top">
      <img class="logo floating-logo" src="assets/logo-animated.gif?v=6" alt="Jasu Discord" fetchpriority="high">
      <a class="discord-button" href="https://discord.gg/MHqmuTnGms" target="_blank" rel="noopener noreferrer" aria-label="Liity Discordiin">
        <img src="assets/discord-white-icon.png" alt="">
        <span>liity discordiin</span>
      </a>
    </main>

    <section class="commands-section" id="commands" aria-labelledby="commands-title">
      <div class="commands-shell">
        <div class="section-heading">
          <h1 id="commands-title">Discord palvelimen komennot</h1>
        </div>
        <div class="commands-grid" id="commands-list" aria-live="polite">
          <article class="command-card command-card--status">
            <h2>Ladataan komentoja...</h2>
            <p>Haetaan botin nykyiset komennot Discordista.</p>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
